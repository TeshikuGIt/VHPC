<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body> 
    <div id="sidebar">
        <img src="images/logo.jpg" alt="Placeholder Image" class="logo">
        <button id="SidebtnF">Filter</button>
        <div  id="dropdown-menuF">
            <input type="datetime-local" id="datetime-search" placeholder="Search by date...">
            <button id="SidebtnF1">Filter Value......</button>
            <div  id="dropdown-menuF1">
                <input type="datetime-local" id="datetime-search" placeholder="Search by date...">
                <input type="datetime-local" id="datetime-search" placeholder="Search by date...">
            </div>
            <button id="SidebtnF2">Filter Test......</button>
            <div  id="dropdown-menuF2">
                <input type="datetime-local" id="datetime-search" placeholder="Search by date...">
                <input type="datetime-local" id="datetime-search" placeholder="Search by date...">
            </div>
        </div>
        <button id="SidebtnD">Databases</button>
        <div  id="dropdown-menuD">
            <button><a href="MainDB.html">Main</a></button>
            <button><a href="Passed.html">Passed</a></button>
            <button><a href="Discarded.html">Discarded</a></button>
        </div>
        <button id="SidebtnC">Contact</button>
        <div  id="dropdown-menuC">
            <button><a href="Contact.html">IT Department</a></button>
            <button><a href="Contact.html">Human reasources</a></button>
            <button><a href="Contact.html">Hardware Department</a></button>
        </div>
    </div>
    <header>
        <div class="Front">
            <button id="toggle-sidebar">☰</button>
        </div>
        <div class="Middle">
            <h1>CRUD Admin panel</h1>
        </div>
        <div class="Back">
            <button id="theme-toggle" class="circle">🌙</button>
        </div>
    </header>
    <main>
        <div>
            <div class="TC">
                <div>
                    <h2>Total</h2>
                    <p>Total: <span id="total-count">0</span></p>
                </div>
            </div>
            <div class="PC">
                <div>
                    <h2>Passed</h2>
                    <p>Passed: <span id="passed-count">0</span></p>
                </div>
                <p class="procent"><span id="passed-count">0</span>%</p>
            </div>
            <div class="DC">
                <div>
                    <h2>Discarded</h2>
                    <p>Discarded: <span id="discarded-count">0</span></p>  
                </div>
                <p class="procent"><span id="discarded-count">0</span>%</p>
            </div>
        </div>
        <div class="Hub">
            <div class="G1">
                <div class="stats">
                    <h2>Results per month for a year</h2>
                    <img src="images/elementor-placeholder-image.png" alt="Placeholder Image">
                </div>
                <div class="graph-container">
                    <h2>Graph</h2>
                    <img src="images/elementor-placeholder-image.png" alt="Placeholder Image">
                </div>
            </div>
            <div class="data-table-container">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>Recent L.E.D Data</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td>Barcode <span data-field="Barcode"></span></td></tr>
                        <tr><td>E(lx) <span data-field="E(lx)"></span></td></tr>
                        <tr><td>Candle E(fc) <span data-field="Candle E(fc)"></span></td></tr>
                        <tr><td>CCT(K) <span data-field="CCT(K)"></span></td></tr>
                        <tr><td>Duv <span data-field="Duv"></span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>       
    </main>
    <footer>
        <p>&copy; 2024 Vision hardware partner. All rights reserved.</p>
    </footer>
</body>
</html>
